<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Weather</title>
    <style>
      body {
        font-family: 'Times New Roman', Times, serif;
        margin: 2rem;
      }
      #error {
        color: #b00020;
        margin: 1.5rem 0 0.75rem;
        min-height: 1.25rem;
      }
      #error.success {
        color: inherit;
      }
      table {
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th,
      td {
        border: 1px solid #575757;
        padding: 0.75rem 1rem;
        text-align: left;
      }
      th {
        background: #eee;
      }
      label,
      #zip {
        vertical-align: middle;
      }
      button {
        margin: 1rem 0;
      }
      .forecast-description,
      .weather-icon {
        vertical-align: middle;
      }
      .weather-icon {
        filter: drop-shadow(1px 2px 2px rgb(0 0 0 / 35%));
        height: 50px;
        margin-left: 0.4rem;
        width: 50px;
      }
      .hot {
        text-shadow: 1px 1px 3px red;
      }
    </style>
  </head>
  <body>
    <h1>Five Day Forecast</h1>
    <form id="weather-form">
      <label for="zip">Zip code:</label>
      <input id="zip" type="text" inputmode="numeric" required />
      <br />
      <button type="submit">Get five day forecast</button>
    </form>

    <p id="error" role="alert"></p>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Forecast</th>
          <th>Temperature (&deg;F)</th>
        </tr>
      </thead>
      <tbody id="temperatures"></tbody>
    </table>

    <script>
      let zipInput = document.getElementById("zip");
      let form = document.getElementById("weather-form");
      let errorMessage = document.getElementById("error");
      let temperatures = document.getElementById("temperatures");

      function formatForecastDate(dateTime) {
        let [date, time] = dateTime.split(" ");
        let [year, month, day] = date.split("-").map(Number);
        let [hour, minute] = time.split(":").map(Number);
        let weekdays = [
          "Sunday",
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
        ];
        let months = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        let period = hour >= 12 ? "PM" : "AM";
        let displayHour = hour % 12 || 12;
        let weekday = weekdays[new Date(year, month - 1, day).getDay()];

        return `${weekday}, ${day} ${months[month - 1]} ${year} @ ${displayHour}:${String(minute).padStart(2, "0")} ${period}`;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorMessage.textContent = "";
        errorMessage.classList.remove("success");

        try {
          let response = await fetch(
            `/forecast?zip=${encodeURIComponent(zipInput.value)}`,
          );
          let body = await response.json();

          if (!response.ok) {
            errorMessage.textContent = body.error || "Something went wrong";
            return;
          }

          temperatures.replaceChildren();
          errorMessage.textContent = `Five day forecast for: ${body.City}`;
          errorMessage.classList.add("success");
          for (let forecast of body.forecasts) {
            let row = document.createElement("tr");
            let dateTimeCell = document.createElement("td");
            let forecastCell = document.createElement("td");
            let temperatureCell = document.createElement("td");
            let weatherIcon = document.createElement("img");
            dateTimeCell.textContent = formatForecastDate(forecast.Date);
            forecastCell.classList.add("forecast-description");
            forecastCell.append(forecast.Forecast, weatherIcon);
            weatherIcon.classList.add("weather-icon");
            weatherIcon.src = `https://openweathermap.org/img/wn/${forecast.Icon}@2x.png`;
            weatherIcon.alt = "";
            temperatureCell.textContent = `${forecast.Temperature.toFixed(1)} \u2109`;
            if (forecast.Temperature >= 90) {
              temperatureCell.classList.add("hot");
            }
            row.append(dateTimeCell, forecastCell, temperatureCell);
            temperatures.appendChild(row);
          }
        } catch (error) {
          errorMessage.textContent = "Something went wrong";
        }
      });
    </script>
  </body>
</html>
