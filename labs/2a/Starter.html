<!doctype html>
<!-- saved from url=(0080)https://www.cs.drexel.edu/~nkl43/cs375/labs/2a_client_side_js_hof0e/starter.html -->
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <title>Starter</title>
    <style type="text/css">
      table {
        border-collapse: collapse;
      }

      td {
        border: 1px solid black;
        width: 40px;
        height: 40px;
        text-align: center;
        font-size: 20px;
      }
    </style>
  </head>
  <body data-new-gr-c-s-check-loaded="14.1307.0" data-gr-ext-installed="">
    <div id="count-container">0</div>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <table>
      <tbody id="number-grid"></tbody>
    </table>

    <button id="increment">Increment</button>

    <script type="text/javascript">
      let numberGrid = [
        [1, 2, 3],
        [4, 5, 6],
      ];

      function incrementGrid() {
        // don't modify this function
        for (let i = 0; i < numberGrid.length; i++) {
          for (let j = 0; j < numberGrid[0].length; j++) {
            numberGrid[i][j]++;
          }
        }
      }

      let count = 0;
      let gridCount = 0;
      let intervalId = null;
      const countContainer = document.getElementById("count-container");
      const numberGridBody = document.getElementById("number-grid");
      const incrementButton = document.getElementById("increment");
      const start = document.getElementById("start");
      const stop = document.getElementById("stop");

      function createTable() {
        for (let i = 0; i < numberGrid.length; i++) {
          const row = document.createElement("tr");

          for (let j = 0; j < numberGrid[i].length; j++) {
            const cell = document.createElement("td");
            cell.textContent = numberGrid[i][j];
            row.appendChild(cell);
          }

          numberGridBody.appendChild(row);
        }
      }

      incrementButton.addEventListener("click", function () {
        incrementGrid();
        updateTable();
      });

      function updateTable() {
        const rows = numberGridBody.rows;

        for (let i = 0; i < numberGrid.length; i++) {
          for (let j = 0; j < numberGrid[i].length; j++) {
            rows[i].cells[j].textContent = numberGrid[i][j];
          }
        }
      }

      function startCount() {
        if (intervalId !== null) {
          return;
        }

        count++;
        countContainer.textContent = count;

        intervalId = setInterval(function () {
          count++;
          countContainer.textContent = count;
        }, 500);
      }

      function stopCount() {
        clearInterval(intervalId);
        intervalId = null;
      }

      start.addEventListener("click", startCount);
      stop.addEventListener("click", stopCount);

      createTable();
    </script>
  </body>
</html>
