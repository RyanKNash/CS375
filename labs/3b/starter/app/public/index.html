<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Demo</title>
</head>
<body>

<h1>Random integers in range</h1>

<div>
  <label for="min">Min:</label>
  <input id="min" name="min" type="number" />
</div>
<div>
  <label for="max">Max:</label>
  <input id="max" name="max" type="number" />
</div>

<button id="send">Get random integer</button>

<div id="error"></div>
<div id="container"></div>

<script>
let minInput = document.getElementById("min");
let maxInput = document.getElementById("max");
let sendButton = document.getElementById("send");
let errorContainer = document.getElementById("error");
let container = document.getElementById("container");

sendButton.addEventListener("click", () => {
  let params = new URLSearchParams({
    min: minInput.value,
    max: maxInput.value,
  });

  fetch(`/random?${params}`).then((response) => {
    return response.json().then((data) => {
      if (!response.ok) {
        throw new Error(data.error);
      }

      return data;
    });
  }).then((data) => {
    console.log("Received body:", data);
    errorContainer.textContent = "";

    let numberElement = document.createElement("div");
    numberElement.textContent = data.number;

    if (data.number > 15) {
      numberElement.style.color = "blue";
    }

    container.appendChild(numberElement);
  }).catch(error => {
    console.log(error);
    errorContainer.textContent = error.message;
  });
});
</script>

</body>
</html>
